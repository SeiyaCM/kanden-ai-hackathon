# Mosquitto ブリッジ設定: AWS IoT Core → ローカル Mosquitto
# 配置先: /etc/mosquitto/conf.d/aws-iot-bridge.conf
#
# <iot-endpoint> は実際の IoT Core エンドポイントに置き換えてください。
# 取得コマンド: aws iot describe-endpoint --endpoint-type iot:Data-ATS --region us-east-1

listener 1883
allow_anonymous true

connection aws-iot
address <iot-endpoint>:8883
bridge_cafile /etc/mosquitto/certs/AmazonRootCA1.pem
bridge_certfile /etc/mosquitto/certs/certificate.pem.crt
bridge_keyfile /etc/mosquitto/certs/private.pem.key
clientid homeassistant
bridge_protocol_version mqttv311
cleansession true
notifications false
try_private false
topic kanden/fatigue in 1
